<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneValue - Get Your Device's Worth</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="container">
            <h1 class="logo" id="btn-logo" style="cursor: pointer;">Phone<span>Value</span></h1>
            <div class="header-actions">
                <div class="currency-toggle" id="currency-toggle-container" style="display: none;">
                    <button class="currency-btn active" data-currency="ALL">ALL</button>
                    <button class="currency-btn" data-currency="EUR">EUR</button>
                </div>
                <div class="auth-buttons" id="auth-buttons">
                    <button class="btn-link" id="btn-show-login">Login</button>
                    <button class="btn-outline" id="btn-show-signup">Sign Up</button>
                </div>
                <div class="user-menu" id="user-menu" style="display: none;" title="Edit Profile">
                    <img id="header-avatar" class="avatar-thumbnail" src="" alt="Avatar" style="display: none;">
                    <span id="user-name-display" style="margin-right: 12px; font-weight: 500;"></span>
                    <button class="btn-outline" id="btn-logout" style="margin-left: 8px;">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container" id="app-container">
        <!-- Screens will be dynamically injected here by JS -->
    </main>

    <footer class="app-footer">
        <div class="container">
            <p>&copy; 2026 PhoneValue MVP</p>
        </div>
    </footer>

    <!-- Templates -->
    <template id="tpl-landing">
        <div class="screen landing-screen fade-in">
            <div class="landing-grid">
                <div class="hero-content">
                    <h2>Unlock the True Value of Your Device</h2>
                    <p>Get instant AI-driven valuations and connect with verified local shops offering the best prices.</p>
                    
                    <div class="search-box">
                        <input type="text" id="model-search" placeholder="Search your phone (e.g. iPhone 17)" autocomplete="off">
                        <div id="search-results" class="search-results"></div>
                    </div>
                    <div class="quick-links">
                        <span style="font-size: 0.875rem; color: var(--text-secondary);">Trending:</span>
                        <div class="chip-group" id="popular-models">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
                <div class="hero-image-wrapper">
                    <img src="assets/hero.png" alt="Futuristic Smartphone" class="hero-image">
                </div>
            </div>

            <div class="features-section">
                <div class="feature-card">
                    <h4>Instant Valuation</h4>
                    <p>Our algorithm calculates real-time market worth based on live data.</p>
                </div>
                <div class="feature-card">
                    <h4>Verified Shops</h4>
                    <p>Connect securely with premium buyers across the local network.</p>
                </div>
                <div class="feature-card">
                    <h4>100% Free</h4>
                    <p>No hidden fees. Get your price and sell on your own terms.</p>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-questionnaire">
        <div class="screen questionnaire-screen fade-in">
            <button class="btn-back" id="btn-back-landing">&larr; Back to Search</button>
            <h2 id="q-model-name">Phone Model</h2>
            
            <div class="progress-bar">
                <div class="progress-fill" id="q-progress"></div>
            </div>
            
            <div id="q-step-1" class="q-step active">
                <h3>Step 1: Storage Capacity</h3>
                <div class="options-grid" id="storage-options">
                    <button class="option-card" data-value="128GB">128 GB</button>
                    <button class="option-card" data-value="256GB">256 GB</button>
                    <button class="option-card" data-value="512GB">512 GB</button>
                    <button class="option-card" data-value="1TB">1 TB</button>
                </div>
            </div>

            <div id="q-step-2" class="q-step">
                <h3>Step 2: Battery Health</h3>
                <div class="battery-input">
                    <label for="battery-range">Battery Capacity: <span id="battery-val">90</span>%</label>
                    <input type="range" id="battery-range" min="50" max="100" value="90">
                </div>
                <button class="btn-primary mt-4" id="btn-next-step2">Next Step</button>
            </div>

            <div id="q-step-3" class="q-step">
                <h3>Step 3: Physical Condition</h3>
                <div class="options-grid vertical" id="damage-options">
                    <button class="option-card" data-value="1">
                        <strong>Mint</strong>
                        <p>Like new, no scratches.</p>
                    </button>
                    <button class="option-card" data-value="2">
                        <strong>Good</strong>
                        <p>Minor wear and tear.</p>
                    </button>
                    <button class="option-card" data-value="3">
                        <strong>Fair</strong>
                        <p>Visible scratches, dents.</p>
                    </button>
                    <button class="option-card" data-value="4">
                        <strong>Cracked</strong>
                        <p>Cracked screen or back.</p>
                    </button>
                    <button class="option-card" data-value="5">
                        <strong>Broken</strong>
                        <p>Does not turn on or major damage.</p>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-results">
        <div class="screen results-screen fade-in">
            <button class="btn-back" id="btn-back-q">&larr; Recalculate</button>
            <div class="valuation-card">
                <h2>Estimated Market Value</h2>
                <div class="price-range">
                    <span id="price-min">--</span> - <span id="price-max">--</span> <span class="currency-label">ALL</span>
                </div>
                <p class="condition-summary" id="res-summary">iPhone 15 • 128GB • 90% Battery • Mint</p>
            </div>

            <div class="shop-list">
                <h3>Top Offers Near You</h3>
                <div id="shop-container">
                    <!-- Shop cards populated by JS -->
                </div>
            </div>

            <div style="text-align: center; margin-top: 40px;">
                <button class="btn-primary" id="btn-consult-ai" style="background: linear-gradient(90deg, var(--accent-purple), var(--accent-color)); color: white; box-shadow: var(--glow);">
                    ✨ Consult AI Advisor
                </button>
            </div>
            
            <button class="btn-back mt-4" id="btn-back-q">&larr; Recalculate</button>
        </div>
    </template>

    <template id="tpl-auth">
        <div class="screen auth-screen fade-in">
            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-target="login">Login</button>
                    <button class="auth-tab" data-target="signup">Sign Up</button>
                </div>

                <!-- Login Form -->
                <form id="form-login" class="auth-form active">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn-primary mt-4">Login</button>
                    <div class="auth-error" id="login-error"></div>
                </form>

                <!-- Signup Form -->
                <form id="form-signup" class="auth-form">
                    <div class="form-group">
                        <label>I am a...</label>
                        <select id="signup-role" required style="width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--border-color);">
                            <option value="seller">Person selling a phone</option>
                            <option value="shop">Business willing to buy</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Full Name / Shop Name</label>
                        <input type="text" id="signup-name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="signup-email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signup-password" required>
                    </div>
                    <button type="submit" class="btn-primary mt-4">Create Account</button>
                    <div class="auth-error" id="signup-error"></div>
                </form>
            </div>
        </div>
    </template>

    <template id="tpl-shop-dashboard">
        <div class="screen shop-screen fade-in">
            <div style="text-align: center; margin-bottom: 40px;">
                <h2 id="shop-welcome" style="font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(90deg, var(--accent-color), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Welcome back, Shop!</h2>
                <p style="color: var(--text-secondary); font-size: 1.125rem;">You are logged in as a business.</p>
            </div>
            
            <div class="features-section" style="margin-top: 20px; margin-bottom: 32px; grid-template-columns: repeat(2, 1fr);">
                <div class="feature-card" style="text-align: left;">
                    <h4 style="font-size: 1.25rem;">📈 Performance Analytics</h4>
                    <p style="margin-top: 8px;">Total Leads: <strong>142</strong></p>
                    <p>Offers Accepted: <strong style="color: var(--success-color);">24</strong></p>
                    <p>Conversion Rate: <strong>16.9%</strong></p>
                </div>
                <div class="feature-card" style="text-align: left;">
                    <h4 style="font-size: 1.25rem;">⚙️ Profile Management</h4>
                    <p style="margin-top: 8px;">Status: <strong style="color: var(--success-color);">Active</strong></p>
                    <p>Location: <strong id="shop-location-display">Tirana Center</strong></p>
                    <p>Contact: <strong id="shop-contact-display">Not provided</strong></p>
                    <button class="btn-outline mt-4" id="btn-edit-profile" style="padding: 4px 12px; font-size: 0.8rem;">Edit Profile</button>
                </div>
            </div>

            <div class="valuation-card" style="text-align: left; padding: 32px;">
                <h3 style="font-size: 1.5rem; color: var(--text-primary);">Incoming Leads</h3>
                <p style="color: var(--text-secondary); margin-top: 16px; font-size: 1rem;">
                    View the list of phones that users have evaluated and want to sell to your shop.
                </p>
                <button class="btn-primary mt-4" id="btn-view-inventory" style="max-width: 300px;">View Inventory Demands</button>
            </div>
        </div>
    </template>

    <template id="tpl-ai-chat">
        <div class="modal-overlay" id="chat-modal">
            <div class="chat-container fade-in">
                <div class="chat-header">
                    <h3>✨ AI Consultant</h3>
                    <button class="btn-close" id="btn-close-chat">&times;</button>
                </div>
                <div class="chat-messages" id="chat-messages">
                    <!-- Messages will be populated here -->
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Ask about the offers, negotiation, etc..." autocomplete="off">
                    <button class="btn-primary" id="btn-send-chat" style="padding: 12px 20px; border-radius: 20px;">Send</button>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-profile-modal">
        <div class="modal-overlay" id="profile-modal">
            <div class="auth-card fade-in" style="width: 90%; max-width: 500px; padding: 32px;">
                <div class="chat-header" style="background: transparent; border-bottom: none; padding: 0 0 16px 0;">
                    <h3 style="font-size: 1.5rem;">Edit Profile</h3>
                    <button class="btn-close" id="btn-close-profile">&times;</button>
                </div>
                <form id="form-edit-profile">
                    <div style="text-align: center; margin-bottom: 20px;">
                        <img id="edit-profile-avatar-preview" src="" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-purple); display: none; margin: 0 auto 10px auto;">
                        <label for="edit-profile-picture" style="cursor: pointer; color: var(--accent-color); font-size: 0.9rem;">Change Profile Picture</label>
                        <input type="file" id="edit-profile-picture" accept="image/*" style="display: none;">
                    </div>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="edit-profile-name" required>
                    </div>
                    <div class="form-group">
                        <label>Physical Address</label>
                        <input type="text" id="edit-profile-address" placeholder="e.g. Blloku, Tirana" required>
                    </div>
                    <div class="form-group">
                        <label>Contact Information (Phone / Email)</label>
                        <input type="text" id="edit-profile-contact" placeholder="e.g. +355 69..." required>
                    </div>
                    <button type="submit" class="btn-primary mt-4" id="btn-save-profile">Save Changes</button>
                    <div class="auth-error" id="profile-error"></div>
                </form>
            </div>
        </div>
    </template>

    <template id="tpl-shop-inventory">
        <div class="screen inventory-screen fade-in">
            <button class="btn-back" id="btn-back-dashboard">&larr; Back to Dashboard</button>
            <h2 style="margin-bottom: 24px;">Inventory Demands</h2>
            <div class="shop-list-container">
                <!-- Dynamically populated by JS -->
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
